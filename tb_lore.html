<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tameable Beasts Wiki</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2592338544514821"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="./css/sections.css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>

  <!-- Logo -->
  <section class="hero">
    <div class="hero-row">
      <img class="hero-logo" src="./assets/images/tameable_beasts/logo.png" alt="Tameable Beasts">
      <div class="hero-badges">
        <img src="https://img.shields.io/badge/Java-Edition-F06400?style=for-the-badge&labelColor=101013&color=F06400"
          alt="Minecraft Java Edition">
        <a href="https://modrinth.com/mod/tameable-beasts" target="_blank" rel="nofollow noopener">
          <img
            src="https://img.shields.io/modrinth/dt/tameable-beasts?logo=modrinth&amp;labelColor=101013&amp;color=1bd96a"
            alt="Modrinth Downloads">
        </a>
        <a href="https://www.curseforge.com/minecraft/mc-mods/tameable-beasts " target="_blank" rel="nofollow noopener">
          <img
            src="https://img.shields.io/curseforge/dt/646425?logo=curseforge&amp;logoColor=eb622b&amp;labelColor=101013&amp;color=eb622b"
            alt="CurseForge Downloads">
        </a>
      </div>
    </div>
  </section>


  <!-- HORIZONTAL AD -->
  <div class=" xl:hidden block" style="height: 10vw;">
    <div class="p-4">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2592338544514821" data-ad-slot="1515942434"
        data-ad-format="auto" data-full-width-responsive="true"></ins>

      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <div class="flex justify-center" style="width: 100%;">

    <!-- VERTICAL AD -->
    <div class="hidden xl:block ad-sidebar">
      <div class="ad-sticky">
        <div class="ad-inner">
          <ins class="adsbygoogle" style="display:block; width:100%; min-width:300px;"
            data-ad-client="ca-pub-2592338544514821" data-ad-slot="3061012292  " data-ad-format="auto"
            data-full-width-responsive="true"></ins>

          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </div>
      </div>
    </div>

    <!-- Gang -->
    <div class="w-full xl:w-[70vw]">
      <img src="./assets/images/tameable_beasts/gang.png" class="xl:block hidden"
        style="margin: 0 auto; height: 64vh;"></img>

      <img src="./assets/images/tameable_beasts/gang.png" class="xl:hidden block"></img>

      <!-- Tameable Beasts -->
      <h2 id="tb-lore" class="lore-box" style="width:100%;"></h2>

      <!-- Mobs -->
      <div class="mb-1">
        <details>
          <!-- Button -->
          <summary class="secondary-button">
            MOBS
          </summary>

          <!-- Content -->
          <div>

            <!-- Common -->
            <img src="./assets/images/tameable_beasts/common.png" class="mob-pic">
            <h2 id="common-lore" class="lore-box"></h2>

            <!-- Racoon -->
            <img src="./assets/images/tameable_beasts/racoon.png" class="mob-pic">
            <h2 id="racoon-lore" class="lore-box"></h2>

            <!-- Penguin -->
            <img src="./assets/images/tameable_beasts/penguin.png" class="mob-pic">
            <h2 id="penguin-lore" class="lore-box"></h2>

            <!-- Chikote -->
            <img src="./assets/images/tameable_beasts/chikote.png" class="mob-pic">
            <h2 id="chikote-lore" class="lore-box"></h2>

            <!-- Shiny Beetle -->
            <img src="./assets/images/tameable_beasts/shiny_beetle.png" class="mob-pic">
            <h2 id="shiny-beetle-lore" class="lore-box"></h2>

            <!-- Scarecrow -->
            <img src="./assets/images/tameable_beasts/scarecrow.png" class="mob-pic">
            <h2 id="scarecrow-lore" class="lore-box"></h2>

            <!-- Grapteranodon -->
            <img src="./assets/images/tameable_beasts/graptera.png" class="mob-pic">
            <h2 id="graptera-lore" class="lore-box"></h2>

            <!-- Argentavis -->
            <img src="./assets/images/tameable_beasts/argentavis.png" class="mob-pic">
            <h2 id="argentavis-lore" class="lore-box"></h2>

            <!-- Quetzal -->
            <img src="./assets/images/tameable_beasts/quetzal.png" class="mob-pic">
            <h2 id="quetzal-lore" class="lore-box"></h2>

            <!-- Ground Beetle -->
            <img src="./assets/images/tameable_beasts/ground_beetles.png" class="mob-pic">
            <h2 id="ground-beetle-lore" class="lore-box"></h2>

            <!-- Roly Poly -->
            <img src="./assets/images/tameable_beasts/roly_poly.png" class="mob-pic">
            <h2 id="roly-poly-lore" class="lore-box"></h2>

            <!-- Grasshoper -->
            <img src="./assets/images/tameable_beasts/grasshopper.png" class="mob-pic">
            <h2 id="grasshopper-lore" class="lore-box"></h2>

            <!-- Gecko -->
            <img src="./assets/images/tameable_beasts/gecko.png" class="mob-pic">
            <h2 id="gecko-lore" class="lore-box"></h2>

            <!-- Fur Golem -->
            <img src="./assets/images/tameable_beasts/fur_golem.png" class="mob-pic">
            <h2 id="fur-golem-lore" class="lore-box"></h2>

        </details>
      </div>

      <!-- Blocks -->
      <div class="mb-1">
        <details>
          <!-- Button -->
          <summary class="secondary-button">
            BLOCKS
          </summary>

          <!-- Fur Golem -->
          <img src="./assets/images/tameable_beasts/eggs.png" class="mob-pic">
          <h2 id="eggs-lore" class="lore-box"></h2>

        </details>
      </div>
    </div>


    <!-- VERTICAL AD -->
    <div class="hidden xl:block ad-sidebar">
      <div class="ad-sticky">
        <div class="ad-inner">
          <ins class="adsbygoogle" style="display:block; width:100%; min-width:300px;"
            data-ad-client="ca-pub-2592338544514821" data-ad-slot="3061012292" data-ad-format="auto"
            data-full-width-responsive="true"></ins>

          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </div>
      </div>
    </div>
  </div>


  <!-- HORIZONTAL AD -->
  <div class=" xl:hidden block" style="height: 10vw;">
    <div class="p-4">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2592338544514821" data-ad-slot="1515942434"
        data-ad-format="auto" data-full-width-responsive="true"></ins>

      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/texts/tameable_beasts.js"></script>
</body>

</html>
