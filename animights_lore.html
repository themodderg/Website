    <meta charset="UTF-8">

<body>


    <section class="hero">
        <div class="hero-row">

            <img class="hero-logo" src="./src/assets/images/animights/Logo.png" alt="Animights">

            <div class="hero-badges">
                <img src="https://img.shields.io/badge/Java-Edition-F06400?style=for-the-badge&labelColor=101013&color=F06400"
                    alt="Minecraft Java Edition">

                <a href="https://www.curseforge.com/minecraft/mc-mods/animights" target="_blank"
                    rel="nofollow noopener">
                    <img src="https://img.shields.io/curseforge/dt/1414819?logo=curseforge&amp;logoColor=eb622b&amp;labelColor=101013&amp;color=eb622b"

                <a href="https://modrinth.com/mod/animights" target="_blank" rel="nofollow noopener">

    <div class="xl:hidden block mobile-ad-slot">
        <div class="p-4">
            <ins class="adsbygoogle" style="display:inline-block; width:728px; height:90px;" data-ad-client="ca-pub-2592338544514821"

            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <div class="flex justify-center" style="width: 100%;">

            <div class="ad-sticky">
                <div class="ad-inner">
                    <ins class="adsbygoogle" style="display:inline-block; width:300px; height:600px;"

                        (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </div>
        </div>


        <div class="w-full xl:w-[70vw]">
            <img src="./src/assets/images/animights/gang.png" class="xl:block hidden"

            <img src="./src/assets/images/animights/gang_smol.png" class="xl:hidden block mx-auto"></img>



            <h2 id="animights-lore" class="lore-box" style="width:100%; "></h2>


            <div class="mb-1">
                <details>

                    <summary class="secondary-button">
                        SQUIRES
                    </summary>

                    <div>
                        <div>
                            <img src="./src/assets/images/animights/squires.png" class="mob-pic">
                            <h2 id="squires-lore" class="lore-box"></h2>

                            <div class="flex justify-center gap-4 mb-4">
                                <img src="./src/assets/images/animights/walk.gif" class="h-64 w-auto object-contain">
                                <img src="./src/assets/images/animights/sit.gif" class="h-64 w-auto object-contain">
                            </div>
                            <h2 id="sit-lore" class="lore-box"></h2>
                        </div>
                    </div>
                </details>
            </div>


            <div class="mb-1">
                <details>

                    <summary class="secondary-button">
                        ITEMS & WEAPONS
                    </summary>

                    <div>
                        <div class="flex justify-center gap-4 mb-4">
                            <img src="./src/assets/images/animights/small_soul.gif" class="h-32 w-auto object-contain">
                            <img src="./src/assets/images/animights/big_soul.gif" class="h-32 w-auto object-contain">
                        </div>
                        <h2 id="items-lore" class="lore-box"></h2>

                        <img src="./src/assets/images/animights/armor.png" class="mob-pic">
                        <h2 id="armor-lore" class="lore-box"></h2>

                        <img src="./src/assets/images/animights/weapons.png" class="mob-pic w-1/2 mx-auto">
                        <h2 id="weapons-lore" class="lore-box"></h2>
                    </div>
                </details>
            </div>


            <div class="mb-1">
                <details>

                    <summary class="secondary-button">
                        KNOWN ISSUES
                    </summary>

                    <div>
                        <h2 id="issues-lore" class="lore-box"></h2>
                    </div>
                </details>
            </div>



        </div>



        <div class="hidden xl:block ad-sidebar">
            <div class="ad-sticky">
                <div class="ad-inner">
                    <ins class="adsbygoogle" style="display:inline-block; width:300px; height:600px;"
