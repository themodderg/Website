<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Animights Wiki</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2592338544514821"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./css/sections.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>

    <!-- Logo -->
    <section class="hero">
        <div class="hero-row">

            <img class="hero-logo" src="./assets/images/animights/Logo.png" alt="Animights">

            <div class="hero-badges">
                <img src="https://img.shields.io/badge/Java-Edition-F06400?style=for-the-badge&labelColor=101013&color=F06400"
                    alt="Minecraft Java Edition">

                <a href="https://www.curseforge.com/minecraft/mc-mods/animights" target="_blank"
                    rel="nofollow noopener">
                    <img src="https://img.shields.io/curseforge/dt/1414819?logo=curseforge&amp;logoColor=eb622b&amp;labelColor=101013&amp;color=eb622b"
                        alt="CurseForge Downloads">
                </a>
                <a href="https://modrinth.com/mod/animights" target="_blank" rel="nofollow noopener">
                    <img src="https://img.shields.io/modrinth/dt/animights?logo=modrinth&amp;labelColor=101013&amp;color=1bd96a"
                        alt="Modrinth Downloads">
                </a>

            </div>
        </div>
    </section>

    <!-- HORIZONTAL AD -->
    <div class=" xl:hidden block" style="height: 10vw;">
        <div class="p-4">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2592338544514821"
                data-ad-slot="1515942434" data-ad-format="auto" data-full-width-responsive="true"></ins>

            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <div class="flex justify-center" style="width: 100%;">

        <!-- VERTICAL AD -->
        <div class="hidden xl:block ad-sidebar">
            <div class="ad-sticky">
                <div class="ad-inner">
                    <ins class="adsbygoogle" style="display:block; width:100%; min-width:300px;"
                        data-ad-client="ca-pub-2592338544514821" data-ad-slot="3061012292" data-ad-format="auto"
                        data-full-width-responsive="true"></ins>

                    <script>
                        (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="w-full xl:w-[70vw]">
            <img src="./assets/images/animights/gang.png" class="xl:block hidden"
                style="margin: 0 auto; height: 64vh;"></img>

            <img src="./assets/images/animights/gang_smol.png" class="xl:hidden block mx-auto"></img>


            <!-- Animights Lore -->
            <h2 id="animights-lore" class="lore-box" style="width:100%; "></h2>

            <!-- SQUIRES -->
            <div class="mb-1">
                <details>
                    <!-- Button -->
                    <summary class="secondary-button">
                        SQUIRES
                    </summary>

                    <div>
                        <div>
                            <img src="./assets/images/animights/squires.png" class="mob-pic">
                            <h2 id="squires-lore" class="lore-box"></h2>

                            <div class="flex justify-center gap-4 mb-4">
                                <img src="./assets/images/animights/walk.gif" class="h-64 w-auto object-contain">
                                <img src="./assets/images/animights/sit.gif" class="h-64 w-auto object-contain">
                            </div>
                            <h2 id="sit-lore" class="lore-box"></h2>
                        </div>
                    </div>
                </details>
            </div>

            <!-- ITEMS & WEAPONS -->
            <div class="mb-1">
                <details>
                    <!-- Button -->
                    <summary class="secondary-button">
                        ITEMS & WEAPONS
                    </summary>

                    <div>
                        <div class="flex justify-center gap-4 mb-4">
                            <img src="./assets/images/animights/small_soul.gif" class="h-32 w-auto object-contain">
                            <img src="./assets/images/animights/big_soul.gif" class="h-32 w-auto object-contain">
                        </div>
                        <h2 id="items-lore" class="lore-box"></h2>

                        <img src="./assets/images/animights/armor.png" class="mob-pic">
                        <h2 id="armor-lore" class="lore-box"></h2>

                        <img src="./assets/images/animights/weapons.png" class="mob-pic w-1/2 mx-auto">
                        <h2 id="weapons-lore" class="lore-box"></h2>
                    </div>
                </details>
            </div>

            <!-- KNOWN ISSUES -->
            <div class="mb-1">
                <details>
                    <!-- Button -->
                    <summary class="secondary-button">
                        KNOWN ISSUES
                    </summary>

                    <div>
                        <h2 id="issues-lore" class="lore-box"></h2>
                    </div>
                </details>
            </div>



        </div>


        <!-- VERTICAL AD -->
        <div class="hidden xl:block ad-sidebar">
            <div class="ad-sticky">
                <div class="ad-inner">
                    <ins class="adsbygoogle" style="display:block; width:100%; min-width:300px;"
                        data-ad-client="ca-pub-2592338544514821" data-ad-slot="3061012292" data-ad-format="auto"
                        data-full-width-responsive="true"></ins>

                    <script>
                        (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </div>
        </div>

    </div>

    <!-- HORIZONTAL AD -->
    <div class=" xl:hidden block" style="height: 10vw;">
        <div class="p-4">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2592338544514821"
                data-ad-slot="1515942434" data-ad-format="auto" data-full-width-responsive="true"></ins>

            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <script src="./js/common.js"></script>
    <script src="./js/texts/animights.js"></script>
</body>

</html>
