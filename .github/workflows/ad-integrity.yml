name: Ad Integrity Check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ad integrity checks
        run: python src/scripts/check_ads_integrity.py
